name: CI

on:
  push:
    branches: [main, develop, 'wip/**']
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Test with coverage
        run: npm run test:coverage

      - name: Check CodeAnt token
        id: codeant-token
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -n "$CODEANT_ACCESS_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CODEANT_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN_GITHUB }}

      - name: Upload coverage to CodeAnt AI
        if: steps.codeant-token.outputs.available == 'true'
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN_GITHUB }}
          COVERAGE_FILE: coverage/cobertura-coverage.xml
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          curl -sS -X GET "https://api.codeant.ai/pr/analysis/coverage/script/get" \
            --output upload_coverage.sh.b64
          base64 -d upload_coverage.sh.b64 > upload_coverage.sh
          chmod +x upload_coverage.sh
          commit_id="${PR_HEAD_SHA:-$GITHUB_SHA}"
          branch="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          bash upload_coverage.sh \
            -t "$ACCESS_TOKEN" \
            -r "$GITHUB_REPOSITORY" \
            -c "$commit_id" \
            -f "$COVERAGE_FILE" \
            -p github \
            -b "$branch" \
            -u "https://github.com"

      - name: Build
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true
        run: npm run build
        env:
          NODE_ENV: production
          NUXT_PUBLIC_APP_URL: https://tarkovtracker.org
          NUXT_PUBLIC_CLARITY_PROJECT_ID: ${{ vars.NUXT_PUBLIC_CLARITY_PROJECT_ID || secrets.NUXT_PUBLIC_CLARITY_PROJECT_ID }}
          NUXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NUXT_PUBLIC_GA_MEASUREMENT_ID || secrets.NUXT_PUBLIC_GA_MEASUREMENT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: build-${{ github.sha }}
          path: dist
          retention-days: 7

  supabase-db:
    name: Supabase DB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Supabase migrations
        run: npm run supabase:check

  workers:
    name: Workers
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            workers/*/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Validate api-gateway
        if: hashFiles('workers/api-gateway/package.json') != ''
        working-directory: workers/api-gateway
        run: |
          npm ci
          npm run typecheck
          npm run validate:openapi

      - name: Test api-gateway
        if: hashFiles('workers/api-gateway/package.json') != ''
        run: npm run test:api-gateway
