name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-meta:
    name: PR Meta
    runs-on: ubuntu-latest
    outputs:
      run_lighthouse: ${{ steps.lighthouse-gate.outputs.run_lighthouse }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Auto-label PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate and apply size label
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const additions = files.reduce((sum, file) => sum + file.additions, 0);
            const deletions = files.reduce((sum, file) => sum + file.deletions, 0);
            const total = additions + deletions;

            let label = 'size/S';
            if (total > 1000) label = 'size/XXL';
            else if (total > 500) label = 'size/XL';
            else if (total > 250) label = 'size/L';
            else if (total > 100) label = 'size/M';

            const { data: existingLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const sizeLabels = existingLabels
              .map(l => l.name)
              .filter(name => name.startsWith('size/'));

            if (sizeLabels.length === 1 && sizeLabels[0] === label) {
              console.log(`Size label ${label} already correct, skipping`);
              return;
            }

            for (const name of sizeLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label],
            });

      - name: Detect Lighthouse scope
        id: lighthouse-gate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(({ name }) => name);
            const labelMatch = labels.includes('performance') || labels.includes('ui');
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const pathMatch = files.some(({ filename }) =>
              filename.startsWith('app/components/') || filename.startsWith('app/features/')
            );
            const runLighthouse = labelMatch || pathMatch;

            core.setOutput('run_lighthouse', runLighthouse ? 'true' : 'false');
            console.log(`Lighthouse gate ${runLighthouse ? 'enabled' : 'skipped'}`);

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: pr-meta
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.pr-meta.outputs.run_lighthouse == 'true'
    env:
      API_ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run generate
        env:
          NODE_ENV: production
          NUXT_PUBLIC_APP_URL: http://localhost:3000
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Start preview server
        run: |
          npx serve dist -s -l 3000 &
          echo $! > /tmp/server.pid
          npx wait-on \
            http-get://localhost:3000 \
            http-get://localhost:3000/tasks \
            http-get://localhost:3000/hideout \
            --timeout 120000 \
            --httpTimeout 20000

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18
        with:
          configPath: lighthouserc.json
          urls: |
            http://localhost:3000
            http://localhost:3000/tasks
            http://localhost:3000/hideout
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
            rm -f /tmp/server.pid
          fi
