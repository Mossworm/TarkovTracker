name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high || true

      - name: Check for outdated dependencies
        run: npm outdated || true

      - name: Install Gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          archive_path="$RUNNER_TEMP/$archive"
          checksums_path="$RUNNER_TEMP/gitleaks_checksums.txt"
          checksum_entry_path="$RUNNER_TEMP/gitleaks_checksum.txt"
          install_dir="$RUNNER_TEMP/gitleaks"

          mkdir -p "$install_dir"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            -o "$archive_path"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            -o "$checksums_path"
          awk -v archive="$archive" '$2 == archive { print }' "$checksums_path" > "$checksum_entry_path"
          test -s "$checksum_entry_path"
          (
            cd "$RUNNER_TEMP"
            sha256sum --check --strict "$checksum_entry_path"
          )
          tar -xzf "$archive_path" -C "$install_dir"
          echo "$install_dir" >> "$GITHUB_PATH"
        env:
          GITLEAKS_VERSION: 8.30.1

      - name: Gitleaks scan
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks git . \
            --exit-code 1 \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload Gitleaks report
        if: steps.gitleaks.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail on Gitleaks findings
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Gitleaks detected secrets. Review the gitleaks-report artifact."
          exit 1

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
